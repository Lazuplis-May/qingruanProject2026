                    <i :class="['fa-solid', record.type === 'diet' ? 'fa-utensils' : 'fa-person-running']"></i>
                  </div>
                  <div>
                    <div class="flex items-center gap-2">
                      <span class="text-[10px] text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded">{{record.type === 'diet' ? '饮食' : '运动'}}</span>
                      <h3 class="font-bold text-slate-800 text-sm">{{record.item}}</h3>
                    </div>
                    <p class="text-xs text-slate-400 mt-1">{{record.date}} · {{record.time}}</p>
                  </div>
                </div>
                <span :class="['text-xs font-bold px-2.5 py-1 rounded-full', record.status ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400']">{{record.status ? '已完成' : '未完成'}}</span>
              </div>
            </div>
          </div>
          <div class="px-4 mt-4">
            <div class="bg-gradient-to-br from-blue-50 to-sky-50 rounded-2xl p-4 border border-blue-100">
              <div class="flex items-start gap-2">
                <i class="fa-solid fa-lightbulb text-amber-500 mt-0.5"></i>
                <div class="flex-1">
                  <p class="font-bold text-slate-800 text-sm mb-1">AI 分析</p>
                  <p class="text-sm text-slate-600 leading-relaxed">本周饮食打卡完成率较好，但晚间运动完成率偏低。建议将运动时间固定为晚餐后1小时，并设置手机提醒。</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      `,
      setup() {
        const weekly = [60, 80, 70, 90, 65, 85, 75];
        const weekLabels = ['一', '二', '三', '四', '五', '六', '日'];
        return { weekly, weekLabels, records: punchRecords };
      }
    };

    // ============ 健康建议 ============
    const HealthAdvice = {
      template: `
        <div class="page-enter pb-24">
          <header class="bg-white px-5 py-4 flex items-center gap-3 border-b border-slate-100 sticky top-0 z-30">
            <button @click="$router.back()" class="text-slate-600 press w-8 h-8 flex items-center justify-center" aria-label="返回"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="font-bold text-slate-800">健康建议</h1>
          </header>
          <div class="px-4 mt-4 space-y-3">
            <article v-for="item in adviceList" :key="item.id" class="bg-white rounded-2xl p-4 shadow-card">
              <div class="flex items-center gap-2 mb-2">
                <div class="w-8 h-8 bg-amber-50 rounded-xl flex items-center justify-center text-amber-600"><i :class="['fa-solid', item.icon]"></i></div>
                <h3 class="font-bold text-slate-800">{{item.title}}</h3>
              </div>
              <div class="flex gap-2 mb-3">
                <span v-for="tag in item.tags" :key="tag" class="text-[10px] text-primary bg-blue-50 px-2 py-0.5 rounded-full">{{tag}}</span>
              </div>
              <p class="text-sm text-slate-600 leading-relaxed">{{item.content}}</p>
            </article>
          </div>
        </div>
      `,
      setup() { return { adviceList }; }
    };

    // ============ 智能管理 ============
    const Admin = {
      template: `
        <div class="page-enter pb-6 min-h-screen bg-slate-100">
          <header class="bg-slate-800 px-5 py-4 flex items-center justify-between text-white sticky top-0 z-30">
            <div class="flex items-center gap-3">
              <button @click="$router.back()" class="text-white press w-8 h-8 flex items-center justify-center" aria-label="返回"><i class="fa-solid fa-chevron-left"></i></button>
              <h1 class="font-bold">AI 智能管理平台</h1>
            </div>
            <span class="text-xs bg-white/10 px-2 py-1 rounded">{{store.user?.nickname}}</span>
          </header>
          <div class="flex border-b border-slate-200 bg-white sticky top-[57px] z-20">
            <button @click="store.adminView = 'chat'" :class="['flex-1 py-3 text-sm font-bold transition', store.adminView === 'chat' ? 'text-primary border-b-2 border-primary' : 'text-slate-500']">自然语言操作</button>
            <button @click="store.adminView = 'logs'" :class="['flex-1 py-3 text-sm font-bold transition', store.adminView === 'logs' ? 'text-primary border-b-2 border-primary' : 'text-slate-500']">操作日志</button>
          </div>

          <div v-if="store.adminView === 'chat'" class="p-4">
            <div class="bg-white rounded-2xl p-4 shadow-card h-[45vh] overflow-y-auto mb-3 space-y-3">
              <div v-for="(msg, idx) in adminMessages" :key="idx" class="flex" :class="msg.role === 'admin' ? 'justify-end' : 'justify-start'">
                <div :class="['max-w-[80%] px-3.5 py-2.5 rounded-2xl text-sm leading-relaxed', msg.role === 'admin' ? 'bg-slate-800 text-white rounded-br-md' : 'bg-blue-50 text-slate-800 rounded-bl-md']">{{msg.text}}</div>
              </div>
            </div>
            <div class="flex gap-2">
              <input v-model="adminInput" @keyup.enter="sendAdmin" placeholder="用自然语言描述操作，如：查询所有用户" class="input-field flex-1 bg-white border border-slate-200 rounded-full px-4 py-2.5 text-sm">
              <button @click="sendAdmin" class="bg-slate-800 text-white px-5 py-2.5 rounded-full text-sm font-bold press">执行</button>
            </div>
            <div class="flex gap-2 mt-3 overflow-x-auto hide-scrollbar">
              <button v-for="q in quickCmds" :key="q" @click="adminInput = q; sendAdmin()" class="whitespace-nowrap px-3 py-1.5 bg-slate-200 text-slate-700 text-xs rounded-full press">{{q}}</button>
            </div>
            <div class="mt-4 bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-800 flex items-start gap-2">
              <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
              <p>演示模式：管理员操作将先由 AI 转换为 SQL 模拟执行，真实环境需连接数据库并校验权限。</p>
            </div>
          </div>

          <div v-else class="p-4">
            <div class="space-y-3">
              <div v-for="log in store.adminLogs" :key="log.id" class="bg-white rounded-2xl p-4 shadow-card">
                <div class="flex justify-between items-center mb-2">
                  <span :class="['text-[10px] font-bold px-2 py-0.5 rounded-full', log.type === '查询' ? 'bg-blue-50 text-blue-600' : 'bg-amber-50 text-amber-600']">{{log.type}}</span>
                  <span class="text-xs text-slate-400">{{log.time}}</span>
                </div>
                <p class="text-sm text-slate-700 font-mono bg-slate-50 p-2.5 rounded-lg">{{log.content}}</p>
                <p class="text-xs text-emerald-600 mt-2 flex items-center gap-1"><i class="fa-solid fa-check-circle"></i>{{log.result}}</p>
              </div>
            </div>
          </div>
        </div>
      `,
      setup() {
        const adminInput = ref('');
        const adminMessages = ref([{ role: 'ai', text: '您好管理员，请用自然语言描述您要执行的数据库操作。\n\n例如：\n• 查询所有注册用户\n• 统计本月新增文章数\n• 删除未激活用户' }]);
        const quickCmds = ['查询所有用户', '统计文章数量', '查询在线医生', '查看今日打卡数据'];
        function sendAdmin() {
          const text = adminInput.value.trim();
          if (!text) return;
          adminMessages.value.push({ role: 'admin', text });
          adminInput.value = '';
          setTimeout(() => {
            const sql = 'SELECT COUNT(*) FROM users; -- 模拟生成的 SQL';
            adminMessages.value.push({ role: 'ai', text: '✅ 已理解您的需求\n\n生成的 SQL：\n' + sql + '\n\n执行结果：当前共有 128 位注册用户。' });
            store.adminLogs.unshift({ id: Date.now(), type: '查询', content: sql, time: new Date().toLocaleString('zh-CN'), result: '成功 · 返回 1 条' });
          }, 1000);
        }
        return { adminInput, adminMessages, sendAdmin, quickCmds, store };
      }
    };

    const ChangePassword = {
      template: `
        <div class="page-enter p-6 min-h-screen bg-white">
          <div class="flex items-center gap-3 mb-6">
            <button @click="$router.back()" class="text-slate-600 press w-8 h-8 flex items-center justify-center" aria-label="返回"><i class="fa-solid fa-chevron-left text-xl"></i></button>
            <h1 class="font-bold text-slate-800 text-xl">修改密码</h1>
          </div>
          <div class="space-y-4">
            <div>
              <label for="new" class="text-sm text-slate-600 font-medium">新密码</label>
              <input id="new" v-model="form.new" type="password" placeholder="不少于8位，含字母和数字" class="input-field w-full mt-1 border border-slate-200 rounded-xl px-4 py-3 text-sm">
            </div>
            <div>
              <label for="confirm" class="text-sm text-slate-600 font-medium">确认新密码</label>
              <input id="confirm" v-model="form.confirm" type="password" placeholder="请再次输入新密码" class="input-field w-full mt-1 border border-slate-200 rounded-xl px-4 py-3 text-sm">
            </div>
          </div>
          <p v-if="error" class="text-danger text-sm mt-3">{{error}}</p>
          <button @click="submit" class="w-full bg-gradient-to-br from-blue-500 to-sky-500 text-white py-3 rounded-xl font-bold mt-6 shadow-btn press">确认修改</button>
        </div>
      `,
      setup() {
        const router = VueRouter.useRouter();
        const form = reactive({ new: '', confirm: '' });
        const error = ref('');
        function submit() {
          error.value = '';
          if (form.new.length < 8) { error.value = '密码长度不少于8位'; return; }
          if (form.new !== form.confirm) { error.value = '两次密码不一致'; return; }
          showToast('密码修改成功', 'success');
          router.push('/admin');
        }
        return { form, error, submit };
      }
    };

    // ============ 路由 ============
    const routes = [
      { path: '/', redirect: '/home' },
      { path: '/home', component: Home },
      { path: '/consultation', component: Consultation },
      { path: '/doctor-chat/:id', component: DoctorChat, props: true },
      { path: '/life-plan', component: LifePlan },
      { path: '/news', component: News },
      { path: '/article/:id', component: ArticleDetail, props: true },
      { path: '/news-favorites', component: NewsFavorites },
      { path: '/diabetes-type/:id', component: DiabetesTypeDetail, props: true },
      { path: '/ai-start', component: AiStart },
      { path: '/profile', component: Profile },
      { path: '/login', component: Login },
      { path: '/risk', component: Risk },
      { path: '/punch', component: Punch },
      { path: '/advice', component: HealthAdvice },
      { path: '/admin', component: Admin },
      { path: '/change-password', component: ChangePassword }
    ];

    const router = createRouter({ history: createWebHashHistory(), routes });

    router.beforeEach((to) => {
      const authRequired = ['/life-plan', '/profile', '/risk', '/punch', '/advice', '/admin', '/news-favorites'].some(p => to.path.startsWith(p));
      const adminRequired = to.path === '/admin';
      if (authRequired && !store.token) return '/login';
      if (adminRequired && !isAdmin.value) return '/home';
    });

    router.afterEach((to) => {
      const map = { '/home': 'home', '/consultation': 'consultation', '/doctor-chat': 'consultation', '/life-plan': 'life-plan', '/news': 'news', '/article': 'news', '/profile': 'profile', '/login': 'profile', '/risk': 'profile', '/punch': 'profile', '/advice': 'profile' };
      const tab = Object.keys(map).find(k => to.path.startsWith(k));
      if (tab) store.activeTab = map[tab];
    });

    const app = createApp({
      components: { AppShell },
      template: '<app-shell></app-shell>'
    });
    app.use(router);
    app.mount('#app');
  </script>
</body>
</html>
